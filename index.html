        // ============================================
        
        async function loadContent() {
            try {
             
                // Charger le contenu français
                const frResponse = await fetch('/content/fr.json');
                if (!frResponse.ok) throw new Error('Erreur chargement FR');
                translations.fr = await frResponse.json();
               
                
                // Charger le contenu anglais
                const enResponse = await fetch('/content/en.json');
                if (!enResponse.ok) throw new Error('Erreur chargement EN');
                translations.en = await enResponse.json();
               
                
                // Charger la configuration
                const configResponse = await fetch('/content/config.json');
                if (!configResponse.ok) throw new Error('Erreur chargement config');
                siteConfig = await configResponse.json();
        
                // Charger les images
                const imagesResponse = await fetch('/content/images.json');
                siteImages = await imagesResponse.json();


                // Mettre à jour les images dynamiquement
                updateImages(siteImages);
                updateConfig(siteConfig);
                // Mettre à jour les liens sociaux dynamiquement
                updateSocialLinks(siteConfig.socialLinks);
                
                // Initialiser la langue
                const initialLang = getInitialLanguage();
                applyTranslations(initialLang);
            
                
            } catch (error) {
                console.error('❌ Erreur lors du chargement:', error);
                
                // FALLBACK : Si les fichiers JSON ne chargent pas, utiliser le contenu de secours
                console.warn('⚠️ Utilisation du contenu de secours (fallback)');
                useFallbackContent();
            }
        }

        function updateImages(images) {

            // Image hero (fond - si vous voulez le rendre dynamique)
            const heroSection = document.querySelector('.hero');
            if (heroSection && images.hero) {
                heroSection.style.backgroundImage = `linear-gradient(rgba(0, 0, 0, 0), rgba(0, 0, 0, 0.2)), url('${images.hero}')`;
            }
            
            // Image des enfants
            const kidsImg = document.querySelector('.impact-image');
            if (kidsImg && images.kids) kidsImg.src = images.kids;
            
            // Icônes des piliers
            if (images.pillars_icons) {
                const pillarsIcons = document.querySelectorAll('.pillar-icon img');
                if (pillarsIcons.length >= 4) {
                    pillarsIcons[0].src = images.pillars_icons.people;
                    pillarsIcons[1].src = images.pillars_icons.light;
                    pillarsIcons[2].src = images.pillars_icons.impact;
                    pillarsIcons[3].src = images.pillars_icons.marketplace;
                }
            }
        }
        function updateConfig(config) {
            if (!config) return;

            // Mettre à jour l'URL Mailchimp
            const form = document.getElementById('mailchimpForm');
            if (form && config.mailchimpUrl) {
                form.action = config.mailchimpUrl;
            }

            // SEO - meta description
            const metaDesc = document.querySelector('meta[name="description"]');
            if (metaDesc && config.seoDescription) {
                metaDesc.setAttribute('content', config.seoDescription);
            }

            // Titre de la page
            if (config.siteName) {
                document.title = config.siteName + " - Impact Investment Platform for Africa";
            }
        }
        // ============================================

        function updateSocialLinks(links) {

            const followBtn = document.querySelector('a.follow-btn');
            if (followBtn) followBtn.href = links.linkedin;

            const socialIcons = document.querySelectorAll('.social-icon');

                socialIcons[1].href = links.facebook;  // Facebook
                socialIcons[2].href = links.twitter;   // Twitter
                socialIcons[3].href = links.instagram; // Instagram
            }
        }

        // ============================================
        // GESTION DES LANGUES
        // ============================================
        
        // Détecter la langue du navigateur
        function getBrowserLanguage() {
            const lang = navigator.language || navigator.userLanguage;
            return lang.startsWith('fr') ? 'fr' : 'en';
        }

        // Récupérer la langue sauvegardée ou celle du navigateur
        function getInitialLanguage() {
            return localStorage.getItem('preferredLanguage') || getBrowserLanguage();
        }

        // Appliquer les traductions sur la page
        function applyTranslations(lang) {
            const t = translations[lang];
            
            if (!t) {
                console.error('❌ Traduction non disponible pour:', lang);
                return;
            }
            
            
            // Mettre à jour tous les éléments avec data-i18n
            document.querySelectorAll('[data-i18n]').forEach(element => {
                const key = element.getAttribute('data-i18n');
                const value = key.split('.').reduce((obj, k) => obj?.[k], t);
                
                if (value) {
                    if (element.tagName === 'INPUT') {
                        element.placeholder = value;
                    } else {
                        element.textContent = value;
                    }
                }
            });

            // Mettre à jour les éléments avec du HTML (pour <br> et <span>)
            document.querySelectorAll('[data-i18n-html]').forEach(element => {
                const key = element.getAttribute('data-i18n-html');
                const value = key.split('.').reduce((obj, k) => obj?.[k], t);
                
                if (value) {
                    element.innerHTML = value;
                }
            });

            // Mettre à jour les placeholders séparément
            document.querySelectorAll('[data-i18n-placeholder]').forEach(element => {
                const key = element.getAttribute('data-i18n-placeholder');
                const value = key.split('.').reduce((obj, k) => obj?.[k], t);
                
                if (value) {
                    element.placeholder = value;
                }
            });

            // Mettre à jour le bouton actif
            document.querySelectorAll('.lang-btn').forEach(btn => {
                btn.classList.toggle('active', btn.getAttribute('data-lang') === lang);
            });

            // Mettre à jour l'attribut lang du HTML
            document.documentElement.lang = lang;

            // Sauvegarder la préférence
            localStorage.setItem('preferredLanguage', lang);
        }

            loadContent();

            // Boutons de changement de langue
            document.querySelectorAll('.lang-btn').forEach(btn => {
                btn.addEventListener('click', function() {
                    const lang = this.getAttribute('data-lang');
                    applyTranslations(lang);
                });
            });
        });

        // ============================================
        // FORMULAIRE MAILCHIMP
        // ============================================
        
        function handleMailchimpSubmit(event) {
            // Mettre à jour le champ de langue avant soumission
            const lang = localStorage.getItem('preferredLanguage') || 'en';
            document.getElementById('langField').value = lang;
            
            // Récupérer le message de succès
            const t = translations[lang];
            const successMsg = t?.cta?.successMessage || "Thank you!";
            
            // Afficher le message de succès après un court délai
            setTimeout(() => {
                const successElement = document.getElementById('successMessage');
                if (successElement) {
                    successElement.textContent = successMsg;
                    successElement.classList.add('show');
                    
                    // Masquer le message après 5 secondes
                    setTimeout(() => {
                        successElement.classList.remove('show');
                    }, 5000);
                }
            }, 500);
            
            // Laisser le formulaire se soumettre normalement
            return true;
        }

        // ============================================
        // SMOOTH SCROLL POUR LES LIENS D'ANCRAGE
        // ============================================
        
        document.querySelectorAll('a[href^="#"]').forEach(anchor => {
            anchor.addEventListener('click', function (e) {
                e.preventDefault();
                const target = document.querySelector(this.getAttribute('href'));
                if (target) {
                    target.scrollIntoView({ behavior: 'smooth' });
                }
            });
        });

        // ============================================
        // AUTHENTIFICATION NETLIFY IDENTITY
        // ============================================
        
        if (window.netlifyIdentity) {
            window.netlifyIdentity.on("init", user => {
                if (!user) {
                    window.netlifyIdentity.on("login", () => {
                        document.location.href = "/admin/";
                    });
                }
            });
        }
    </script>
    <script src="animation.js"></script>
</body>
</html>
