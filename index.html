<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>All For Impact - Impact Investment Platform for Africa</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800;900&family=Red+Hat+Display:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Red Hat Display', sans-serif;
            color: #173A1B;
            line-height: 1.6;
        }

        /* Language Switcher */
        .language-switcher {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 1000;
            display: flex;
            gap: 10px;
            background: rgba(255, 255, 255, 0.95);
            padding: 10px 15px;
            border-radius: 25px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
        }

        .lang-btn {
            background: transparent;
            border: none;
            font-family: 'Red Hat Display', sans-serif;
            font-weight: 600;
            font-size: 14px;
            color: #173A1B;
            cursor: pointer;
            padding: 5px 12px;
            border-radius: 15px;
            transition: all 0.3s;
        }

        .lang-btn.active {
            background: #FF882F;
            color: white;
        }

        .lang-btn:hover:not(.active) {
            background: #FBF5EC;
        }

        /* Hero Section */
        .hero {
            position: relative;
            height: 790px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            background: linear-gradient(rgba(0, 0, 0, 0.4), rgba(0, 0, 0, 0.4)),
                        url('images/hero.jpg') center/cover;
            overflow: hidden;
        }

        .hero::before {
            content: '';
            position: absolute;
            width: 1020px;
            height: 1020px;
            border: 2px solid #FF882F;
            border-radius: 50%;
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%);
            z-index: 0;
        }

        .hero > * {
            position: relative;
            z-index: 1;
        }

        .logo {
            position: relative;
            width: 240px;
            height: 110px;
            margin-top: 85px;
            margin-bottom: 200px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .logo img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        .hero h1 {
            position: relative;
            width: 738px;
            font-family: 'Poppins', sans-serif;
            font-style: italic;
            font-weight: 900;
            font-size: 52px;
            line-height: 52px;
            text-align: center;
            color: #FFFFFF;
            margin-bottom: 26px;
            letter-spacing: 0.5px;
        }

        .hero-subtitle {
            position: relative;
            width: 538px;
            font-family: 'Red Hat Display', sans-serif;
            font-style: normal;
            font-weight: 500;
            font-size: 18px;
            line-height: 22px;
            text-align: center;
            color: #FFFFFF;
            margin-bottom: 43px;
        }

        .cta-btn {
            width: 242px;
            height: 38px;
            background: #FF882F;
            border-radius: 5px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Poppins', sans-serif;
            font-style: italic;
            font-weight: 900;
            font-size: 18px;
            line-height: 28px;
            color: #FFFFFF;
            text-decoration: none;
            transition: all 0.3s;
            letter-spacing: 0.3px;
        }

        .cta-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(255, 136, 47, 0.4);
        }

        /* Impact Section */
        .impact-section {
            background: white;
            padding: 100px 0;
        }

        .container {
            max-width: 1280px;
            margin: 0 auto;
            padding: 0 70px;
        }

        .section-title {
            font-family: 'Poppins', sans-serif;
            font-style: italic;
            font-weight: 900;
            font-size: 38px;
            line-height: 38px;
            text-align: center;
            color: #173A1B;
            margin-bottom: 72px;
            letter-spacing: 0.8px;
        }

        .section-title .orange {
            color: #FF882F;
        }

        .impact-layout {
            display: grid;
            grid-template-columns: 494px 1fr;
            gap: 70px;
            align-items: start;
        }

        .impact-image {
            width: 494px;
            height: 329px;
            border-radius: 5px;
            object-fit: cover;
        }

        .impact-text-content {
            padding-top: 0;
        }

        .impact-text-content > p {
            font-family: 'Red Hat Display', sans-serif;
            font-weight: 700;
            font-size: 18px;
            line-height: 22px;
            color: #173A1B;
            margin-bottom: 33px;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 39px 37px;
        }

        .stat-item {
            background: transparent;
        }

        .stat-number {
            font-family: 'Poppins', sans-serif;
            font-weight: 900;
            font-size: 34px;
            line-height: 22px;
            color: #FF882F;
            margin-right: 8px;
        }

        .stat-label {
            font-family: 'Red Hat Display', sans-serif;
            font-weight: 700;
            font-size: 18px;
            line-height: 22px;
            color: #173A1B;
        }

        /* Pillars Section */
        .pillars-section {
            background: #FBF5EC;
            padding: 97px 0 120px;
        }

        .pillars-intro {
            text-align: center;
            margin-bottom: 132px;
        }

        .pillars-intro p {
            width: 904px;
            margin: 22px auto 0;
            font-family: 'Red Hat Display', sans-serif;
            font-weight: 700;
            font-size: 18px;
            line-height: 22px;
            text-align: center;
            color: #173A1B;
        }

        .pillars-grid {
            display: grid;
            grid-template-columns: repeat(4, 262px);
            gap: 31px;
            justify-content: center;
        }

        .pillar-card {
            width: 279px;
            min-height: 342px;
            background: #FFFFFF;
            border-radius: 5px;
            padding-top: 100px;
            padding-bottom: 30px;
            text-align: center;
            position: relative;
            display: flex;
            flex-direction: column;
        }

        .pillar-card.primary {
            background: #00613B;
        }

        .pillar-icon {
            position: absolute;
            width: 93px;
            height: 93px;
            left: 50%;
            transform: translateX(-50%);
            top: -47px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(79, 214, 137, 0.3);
            border-radius: 50%;
            border: 4px solid #FBF5EC;
        }

        .pillar-icon svg {
            width: 50px;
            height: 50px;
        }

        .pillar-title {
            font-family: 'Poppins', sans-serif;
            font-weight: 900;
            font-size: 24px;
            line-height: 26px;
            text-align: center;
            color: #063F00;
            margin-bottom: 27px;
            padding: 0 20px;
            min-height: 54px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 0px;
            word-wrap: break-word;
            hyphens: none;
        }

        .pillar-card.primary .pillar-title {
            color: #FFFFFF;
        }

        .pillar-title-main {
            font-weight: 900;
            font-size: 24px;
        }

        .pillar-title-sub {
            font-size: 16px;
            font-weight: 400;
            font-family: 'Red Hat Display', sans-serif;
            margin-top: 2px;
        }

        .pillar-list {
            list-style: none;
            font-family: 'Red Hat Display', sans-serif;
            font-weight: 600;
            font-size: 18px;
            line-height: 28px;
            text-align: center;
            color: #063F00;
            padding: 0 34px;
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
        }

        .pillar-card.primary .pillar-list {
            color: #FFFFFF;
        }

        .pillar-list li {
            margin-bottom: 0;
        }

        /* CTA Footer Section */
        .cta-footer {
            background: #173A1B;
            padding-top: 111px;
            padding-bottom: 0;
            text-align: center;
            color: white;
        }

        .cta-footer h2 {
            font-family: 'Poppins', sans-serif;
            font-style: italic;
            font-weight: 900;
            font-size: 38px;
            line-height: 38px;
            text-align: center;
            color: #FFFFFF;
            margin-bottom: 22px;
            letter-spacing: 1.5px;
        }

        .cta-footer h2 .orange {
            color: #FF882F;
        }

        .cta-footer > p {
            width: 626px;
            margin: 0 auto 40px;
            font-family: 'Red Hat Display', sans-serif;
            font-weight: 700;
            font-size: 18px;
            line-height: 22px;
            text-align: center;
            color: #FFFFFF;
        }

        .email-form {
            position: relative;
            width: 650px;
            height: 62px;
            margin: 5% auto 11px;
            background: #052B0A;
            border-radius: 5px;
            display: flex;
            align-items: center;
            padding: 12px 12px 12px 32px;
        }

        .email-input {
            flex: 1;
            border: none;
            background: transparent;
            font-family: 'Red Hat Display', sans-serif;
            font-weight: 600;
            font-size: 18px;
            line-height: 22px;
            color: #FFFFFF;
            outline: none;
        }

        .email-input::placeholder {
            color: #FFFFFF;
        }

        .email-submit {
            width: 259px;
            height: 38px;
            background: #FF882F;
            border-radius: 5px;
            border: none;
            font-family: 'Poppins', sans-serif;
            font-style: italic;
            font-weight: 900;
            font-size: 18px;
            line-height: 28px;
            color: #FFFFFF;
            cursor: pointer;
            transition: all 0.3s;
            letter-spacing: 0.3px;
        }

        .email-submit:hover {
            background: #ff9d52;
        }

        .no-spam {
            font-family: 'Red Hat Display', sans-serif;
            font-weight: 500;
            font-size: 12px;
            line-height: 28px;
            text-align: center;
            color: #FFFFFF;
            margin-bottom: 111px;
        }

        /* Success Message */
        .success-message {
            display: none;
            width: 650px;
            margin: 20px auto;
            padding: 15px;
            background: rgba(79, 214, 137, 0.2);
            border: 2px solid #4FD689;
            border-radius: 5px;
            color: #4FD689;
            font-family: 'Red Hat Display', sans-serif;
            font-weight: 600;
            font-size: 16px;
            text-align: center;
        }

        .success-message.show {
            display: block;
        }

        /* Social Section */
        .social-section {
            background: #052B0A;
            padding: 59px 0 47px;
            position: relative;
        }

        .follow-btn {
            display: inline-block;
            width: auto;
            height: 38px;
            background: #00613B;
            border-radius: 5px;
            font-family: 'Poppins', sans-serif;
            font-style: italic;
            font-weight: 900;
            font-size: 18px;
            line-height: 38px;
            text-align: center;
            color: #FFFFFF;
            text-decoration: none;
            transition: all 0.3s;
            letter-spacing: 0.3px;
            padding: 0 25px;
            white-space: nowrap;
        }
        
        .social-section > a.follow-btn {
            display: block;
            width: fit-content;
            margin: 0 auto 64px;
        }

        .follow-btn:hover {
            background: #007a4a;
        }

        .social-icons {
            display: flex;
            justify-content: flex-end;
            gap: 15px;
            max-width: 1280px;
            margin: 15px auto;
            padding: 0 58px 0 0;
        }

        .social-icon {
            width: 27px;
            height: 27px;
            background: #00613B;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s;
        }

        .social-icon:hover {
            transform: translateY(-3px);
        }

        .social-icon svg {
            width: 14px;
            height: 14px;
            fill: white;
        }

        /* Footer */
        .footer-content {
            border-top: 0.5px solid #FFFFFF;
            padding: 11px 0 0;
            max-width: 1280px;
            margin: 0 auto;
            padding: 11px 70px 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .footer-content > div:first-child {
            font-family: 'Red Hat Display', sans-serif;
            font-weight: 500;
            font-size: 12px;
            line-height: 28px;
            color: #FFFFFF;
        }

        .footer-links {
            display: flex;
            gap: 44px;
        }

        .footer-links a {
            font-family: 'Red Hat Display', sans-serif;
            font-weight: 500;
            font-size: 12px;
            line-height: 28px;
            color: #FFFFFF;
            text-decoration: none;
            transition: color 0.3s;
        }

        .footer-links a:hover {
            color: #FF882F;
        }

        /* Responsive */
        @media (max-width: 1280px) {
            .hero h1 {
                width: 90%;
                font-size: 32px;
                line-height: 32px;
            }

            .hero-subtitle {
                width: 90%;
            }

            .logo {
                width: 180px;
                height: 82px;
                margin-top: 54px;
            }

            .section-title {
                font-size: 28px;
                line-height: 28px;
            }

            .impact-layout {
                grid-template-columns: 1fr;
                gap: 32px;
            }

            .impact-image {
                width: 100%;
                height: auto;
            }

            .pillars-grid {
                grid-template-columns: 1fr;
                gap: 79px;
            }

            .pillar-card {
                width: 100%;
                max-width: 350px;
                margin: 0 auto;
            }

            .pillars-intro p {
                width: 90%;
            }

            .email-form,
            .success-message {
                width: 90%;
                flex-direction: column;
                height: auto;
                gap: 10px;
                padding: 15px;
            }

            .email-submit {
                width: 100%;
            }

            .social-icons {
                justify-content: center;
                padding: 0;
            }

            .footer-content {
                flex-direction: column;
                gap: 20px;
                text-align: center;
            }

            .footer-links {
                flex-direction: column;
                gap: 10px;
            }
        }

        @media (min-width: 1281px) {
            .pillars-grid {
                grid-template-columns: repeat(4, 262px);
                gap: 31px;
            }
        }
    </style>
</head>
<body>
    <!-- Language Switcher -->
    <div class="language-switcher">
        <button class="lang-btn" data-lang="en">EN</button>
        <button class="lang-btn" data-lang="fr">FR</button>
    </div>

    <!-- Hero Section -->
    <section class="hero">
        <div class="logo">
            <img src="images/logo.png" alt="All For Impact Logo">
        </div>
        <h1 data-i18n-html="hero.title"></h1>
        <p class="hero-subtitle" data-i18n="hero.subtitle"></p>
        <a href="#join" class="cta-btn" data-i18n="hero.cta"></a>
    </section>

    <!-- Impact Section -->
    <section class="impact-section">
        <div class="container">
            <h2 class="section-title" data-i18n-html="impact.title"></h2>

            <div class="impact-layout">
                <div>
                    <img src="images/kids.jpg" 
                         alt="Students in African classroom" 
                         class="impact-image">
                </div>

                <div class="impact-text-content">
                    <p data-i18n="impact.description"></p>

                    <div class="stats-grid">
                        <div class="stat-item">
                            <span class="stat-number" data-i18n="impact.stat1.number"></span>
                            <span class="stat-label" data-i18n="impact.stat1.label"></span>
                        </div>
                        <div class="stat-item">
                            <span class="stat-number" data-i18n="impact.stat2.number"></span>
                            <span class="stat-label" data-i18n="impact.stat2.label"></span>
                        </div>
                        <div class="stat-item">
                            <span class="stat-number" data-i18n="impact.stat3.number"></span>
                            <span class="stat-label" data-i18n="impact.stat3.label"></span>
                        </div>
                        <div class="stat-item">
                            <span class="stat-number" data-i18n="impact.stat4.number"></span>
                            <span class="stat-label" data-i18n="impact.stat4.label"></span>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <!-- Pillars Section -->
    <section class="pillars-section">
        <div class="container">
            <div class="pillars-intro">
                <h2 class="section-title" data-i18n-html="pillars.title"></h2>
                <p data-i18n="pillars.subtitle"></p>
            </div>

            <div class="pillars-grid">
                <!-- FOR WHOM -->
                <div class="pillar-card primary">
                    <div class="pillar-icon">
                        <svg viewBox="0 0 24 24" fill="white">
                            <path d="M16 11c1.66 0 2.99-1.34 2.99-3S17.66 5 16 5c-1.66 0-3 1.34-3 3s1.34 3 3 3zm-8 0c1.66 0 2.99-1.34 2.99-3S9.66 5 8 5C6.34 5 5 6.34 5 8s1.34 3 3 3zm0 2c-2.33 0-7 1.17-7 3.5V19h14v-2.5c0-2.33-4.67-3.5-7-3.5zm8 0c-.29 0-.62.02-.97.05 1.16.84 1.97 1.97 1.97 3.45V19h6v-2.5c0-2.33-4.67-3.5-7-3.5z"/>
                        </svg>
                    </div>
                    <h3 class="pillar-title" data-i18n-html="pillars.forWhom.title"></h3>
                    <ul class="pillar-list">
                        <li data-i18n="pillars.forWhom.content"></li>
                    </ul>
                </div>

                <!-- INFORMATION EDUCATION -->
                <div class="pillar-card">
                    <div class="pillar-icon">
                        <svg viewBox="0 0 24 24" fill="#063F00">
                            <path d="M12 3L1 9l4 2.18v6L12 21l7-3.82v-6l2-1.09V17h2V9L12 3zm6.82 6L12 12.72 5.18 9 12 5.28 18.82 9zM17 15.99l-5 2.73-5-2.73v-3.72L12 15l5-2.73v3.72z"/>
                        </svg>
                    </div>
                    <h3 class="pillar-title" data-i18n-html="pillars.information.title"></h3>
                    <ul class="pillar-list">
                        <li data-i18n-html="pillars.information.content"></li>
                    </ul>
                </div>

                <!-- IMPACT -->
                <div class="pillar-card">
                    <div class="pillar-icon">
                        <svg viewBox="0 0 24 24" fill="#063F00">
                            <path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/>
                        </svg>
                    </div>
                    <h3 class="pillar-title" data-i18n-html="pillars.impact.title"></h3>
                    <ul class="pillar-list">
                        <li data-i18n-html="pillars.impact.content"></li>
                    </ul>
                </div>

                <!-- INVESTMENT -->
                <div class="pillar-card">
                    <div class="pillar-icon">
                        <svg viewBox="0 0 24 24" fill="#063F00">
                            <path d="M20 4H4c-1.11 0-1.99.89-1.99 2L2 18c0 1.11.89 2 2 2h16c1.11 0 2-.89 2-2V6c0-1.11-.89-2-2-2zm0 14H4v-6h16v6zm0-10H4V6h16v2z"/>
                        </svg>
                    </div>
                    <h3 class="pillar-title" data-i18n-html="pillars.investment.title"></h3>
                    <ul class="pillar-list mt-m15">
                        <li data-i18n-html="pillars.investment.content"></li>
                    </ul>
                </div>
            </div>
        </div>
    </section>

    <!-- CTA Footer -->
    <section class="cta-footer" id="join">
        <div class="container">
            <h2 data-i18n-html="cta.title"></h2>
            <p data-i18n-html="cta.subtitle"></p>

            <!-- Mailchimp Form -->
            <form class="email-form" 
                  action="https://app.us6.list-manage.com/subscribe/post?u=ca86690bcd087bc874cc2f0c2&id=4f36b87874&f_id=00acd0e5f0" 
                  method="POST" 
                  target="_blank"
                  onsubmit="return handleMailchimpSubmit(event)">
                
                <!-- Email Field -->
                <input type="email" 
                       name="EMAIL" 
                       class="email-input" 
                       data-i18n-placeholder="cta.emailPlaceholder" 
                       required>
                
                <!-- Hidden Language Field -->
                <input type="hidden" name="LANG" id="langField" value="">
                
                <!-- Anti-bot field (keep exactly as is) -->
                <div style="position: absolute; left: -5000px;" aria-hidden="true">
                    <input type="text" name="b_ca86690bcd087bc874cc2f0c2_4f36b87874" tabindex="-1" value="">
                </div>
                
                <button type="submit" class="email-submit" data-i18n="cta.button"></button>
            </form>

            <!-- Success Message -->
            <div class="success-message" id="successMessage"></div>

            <p class="no-spam" data-i18n="cta.noSpam"></p>
        </div>

        <div class="social-section">
            <a href="#" class="follow-btn" data-i18n="social.followLinkedIn"></a>
            
            <div class="social-icons">
                <a href="#" class="social-icon" aria-label="LinkedIn">
                    <svg viewBox="0 0 24 24">
                        <path d="M19 3a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h14m-.5 15.5v-5.3a3.26 3.26 0 0 0-3.26-3.26c-.85 0-1.84.52-2.32 1.3v-1.11h-2.79v8.37h2.79v-4.93c0-.77.62-1.4 1.39-1.4a1.4 1.4 0 0 1 1.4 1.4v4.93h2.79M6.88 8.56a1.68 1.68 0 0 0 1.68-1.68c0-.93-.75-1.69-1.68-1.69a1.69 1.69 0 0 0-1.69 1.69c0 .93.76 1.68 1.69 1.68m1.39 9.94v-8.37H5.5v8.37h2.77z"/>
                    </svg>
                </a>

        // Get browser language
        function getBrowserLanguage() {
            const lang = navigator.language || navigator.userLanguage;
            return lang.startsWith('fr') ? 'fr' : 'en';
        }

        // Get stored language or browser language
        function getInitialLanguage() {
            return localStorage.getItem('preferredLanguage') || getBrowserLanguage();
        }

        // Apply translations
        function applyTranslations(lang) {
            const t = translations[lang];
            
            // Update all elements with data-i18n attribute
            document.querySelectorAll('[data-i18n]').forEach(element => {
                const key = element.getAttribute('data-i18n');
                const value = key.split('.').reduce((obj, k) => obj?.[k], t);
                
                if (value) {
                    if (element.tagName === 'INPUT') {
                        element.placeholder = value;
                    } else {
                        element.textContent = value;
                    }
                }
            });

            // Update elements with HTML content (for <br> and <span>)
            document.querySelectorAll('[data-i18n-html]').forEach(element => {
                const key = element.getAttribute('data-i18n-html');
                const value = key.split('.').reduce((obj, k) => obj?.[k], t);
                
                if (value) {
                    element.innerHTML = value;
                }
            });

            // Update placeholder separately
            document.querySelectorAll('[data-i18n-placeholder]').forEach(element => {
                const key = element.getAttribute('data-i18n-placeholder');
                const value = key.split('.').reduce((obj, k) => obj?.[k], t);
                
                if (value) {
                    element.placeholder = value;
                }
            });

            // Update active button
            document.querySelectorAll('.lang-btn').forEach(btn => {
                btn.classList.toggle('active', btn.getAttribute('data-lang') === lang);
            });

            // Update HTML lang attribute
            document.documentElement.lang = lang;

            // Store preference
            localStorage.setItem('preferredLanguage', lang);
        }

        // Initialize language on page load
        document.addEventListener('DOMContentLoaded', function() {
            const initialLang = getInitialLanguage();
            applyTranslations(initialLang);

            // Language switcher event listeners
            document.querySelectorAll('.lang-btn').forEach(btn => {
                btn.addEventListener('click', function() {
                    const lang = this.getAttribute('data-lang');
                    applyTranslations(lang);
                });
            });
        });

        // Mailchimp form submission handler
        function handleMailchimpSubmit(event) {
            // Update language field before submission
            const lang = localStorage.getItem('preferredLanguage') || 'en';
            document.getElementById('langField').value = lang;
            
            // Get success message
            const t = translations[lang];
            const successMsg = t.cta.successMessage;
            
            // Show success message after a short delay
            setTimeout(() => {
                const successElement = document.getElementById('successMessage');
                successElement.textContent = successMsg;
                successElement.classList.add('show');
                
                // Hide success message after 5 seconds
                setTimeout(() => {
                    successElement.classList.remove('show');
                }, 5000);
            }, 500);
            
            // Let the form submit normally to Mailchimp
            return true;
        }

        // Smooth scroll for anchor links
        document.querySelectorAll('a[href^="#"]').forEach(anchor => {
            anchor.addEventListener('click', function (e) {
                e.preventDefault();
                const target = document.querySelector(this.getAttribute('href'));
                if (target) {
                    target.scrollIntoView({ behavior: 'smooth' });
                }
            });
        });
