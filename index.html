    <script>
        // ============================================
        // VARIABLES GLOBALES
        // ============================================
        let translations = { en: {}, fr: {} };
        let siteConfig = {};
        let siteImages = {};

        // ============================================
        // CHARGEMENT DU CONTENU DEPUIS GITHUB
        // ============================================
        async function loadContent() {
            try {
                const BASE = 'https://raw.githubusercontent.com/mencia1999/all-for-impact/main';

                const [frResponse, enResponse, configResponse, imagesResponse] = await Promise.all([
                    fetch(`${BASE}/content/fr.json`),
                    fetch(`${BASE}/content/en.json`),
                    fetch(`${BASE}/content/config.json`),
                    fetch(`${BASE}/content/images.json`)
                ]);

                if (!frResponse.ok) throw new Error('Erreur chargement FR');
                translations.fr = await frResponse.json();

                if (!enResponse.ok) throw new Error('Erreur chargement EN');
                translations.en = await enResponse.json();

                if (!configResponse.ok) throw new Error('Erreur chargement config');
                siteConfig = await configResponse.json();

                siteImages = await imagesResponse.json();

                updateImages(siteImages);
                updateConfig(siteConfig);
                updateSocialLinks(siteConfig.socialLinks);

                const initialLang = getInitialLanguage();
                applyTranslations(initialLang);

                // Charger la bannière C3
                try {
                    const bannerResponse = await fetch(`${BASE}/content/banner.json`);
                    if (bannerResponse.ok) {
                        window._bannerData = await bannerResponse.json();
                        updateBanner(window._bannerData);
                    }
                } catch(e) {}

            } catch (error) {
                console.error('Erreur lors du chargement:', error);
                useFallbackContent();
            }
        }

        // ============================================
        // BANNIÈRE C3
        // ============================================
        function updateBanner(banner) {
            if (!banner || !banner.active) return;

            const lang = localStorage.getItem('preferredLanguage') || 'fr';
            const isFr = lang === 'fr';

            const text       = isFr ? banner.text_fr      : banner.text_en;
            const btn1Text   = isFr ? banner.btn1_text_fr : banner.btn1_text_en;
            const btn2Text   = isFr ? banner.btn2_text_fr : banner.btn2_text_en;

            document.getElementById('bannerText').innerHTML     = text || '';
            document.getElementById('bannerLink1Text').textContent = btn1Text || '';
            document.getElementById('bannerLink1').href         = banner.btn1_url || '#';
            document.getElementById('bannerLink2Text').textContent = btn2Text || '';
            document.getElementById('bannerLink2').href         = banner.btn2_url || '#';

            document.getElementById('bannerSpotlight').style.display = 'flex';
        }

        function closeBanner() {
            document.getElementById('bannerSpotlight').style.display = 'none';
        }

        // CONTENU DE SECOURS

        // ============================================
        // IMAGES
        // ============================================
        function updateImages(images) {
            if (!images) return;
            const logoImg = document.querySelector('.logo img');
            if (logoImg && images.logo) logoImg.src = images.logo;
            const heroSection = document.querySelector('.hero');
            if (heroSection && images.hero) {
                heroSection.style.backgroundImage = `linear-gradient(rgba(0,0,0,0), rgba(0,0,0,0.2)), url('${images.hero}')`;
            }
            const kidsImg = document.querySelector('.impact-image');
            if (kidsImg && images.kids) kidsImg.src = images.kids;
            if (images.pillars_icons) {
                const icons = document.querySelectorAll('.pillar-icon img');
                if (icons.length >= 4) {
                    icons[0].src = images.pillars_icons.people;
                    icons[1].src = images.pillars_icons.light;
                    icons[2].src = images.pillars_icons.impact;
                    icons[3].src = images.pillars_icons.marketplace;
                }
            }
        }

        // ============================================
        // CONFIG
        // ============================================
        function updateConfig(config) {
            if (!config) return;
            const form = document.getElementById('mailchimpForm');
            if (form && config.mailchimpUrl) form.action = config.mailchimpUrl;
            const metaDesc = document.querySelector('meta[name="description"]');
            if (metaDesc && config.seoDescription) metaDesc.setAttribute('content', config.seoDescription);
            if (config.siteName) document.title = config.siteName + " - Impact Investment Platform for Africa";
        }

        // ============================================
        // LIENS SOCIAUX
        // ============================================
        function updateSocialLinks(links) {
            if (!links) return;
            const followBtn = document.querySelector('a.follow-btn');
            if (followBtn) followBtn.href = links.linkedin;
            const socialIcons = document.querySelectorAll('.social-icon');
            if (socialIcons.length >= 4) {
                socialIcons[0].href = links.linkedin;
                socialIcons[1].href = links.facebook;
                socialIcons[2].href = links.twitter;
                socialIcons[3].href = links.instagram;
            }
        }

        // ============================================
        // LANGUES
        // ============================================
        function getBrowserLanguage() {
            const lang = navigator.language || navigator.userLanguage;
            return lang.startsWith('fr') ? 'fr' : 'en';
        }

        function getInitialLanguage() {
            return localStorage.getItem('preferredLanguage') || getBrowserLanguage();
        }

        function applyTranslations(lang) {
            const t = translations[lang];
            if (!t) { console.error('Traduction non disponible pour:', lang); return; }

            document.querySelectorAll('[data-i18n]').forEach(el => {
                const key = el.getAttribute('data-i18n');
                const value = key.split('.').reduce((obj, k) => obj?.[k], t);
                if (value) {
                    if (el.tagName === 'INPUT') el.placeholder = value;
                    else el.textContent = value;
                }
            });

            document.querySelectorAll('[data-i18n-html]').forEach(el => {
                const key = el.getAttribute('data-i18n-html');
                const value = key.split('.').reduce((obj, k) => obj?.[k], t);
                if (value) el.innerHTML = value;
            });

            document.querySelectorAll('[data-i18n-placeholder]').forEach(el => {
                const key = el.getAttribute('data-i18n-placeholder');
                const value = key.split('.').reduce((obj, k) => obj?.[k], t);
                if (value) el.placeholder = value;
            });

            document.querySelectorAll('.lang-btn').forEach(btn => {
                btn.classList.toggle('active', btn.getAttribute('data-lang') === lang);
            });

            document.documentElement.lang = lang;
            localStorage.setItem('preferredLanguage', lang);

            // Re-appliquer la bannière dans la bonne langue
            if (window._bannerData) updateBanner(window._bannerData);
        }

        // INIT
        // ============================================
        document.addEventListener('DOMContentLoaded', function() {
            loadContent();
            document.querySelectorAll('.lang-btn').forEach(btn => {
                btn.addEventListener('click', function() {
                    applyTranslations(this.getAttribute('data-lang'));
                });
            });
        });

        // ============================================
        // FORMULAIRE MAILCHIMP
        // ============================================
        function handleMailchimpSubmit(event) {
            const lang = localStorage.getItem('preferredLanguage') || 'en';
            document.getElementById('langField').value = lang;
            const t = translations[lang];
            const successMsg = t?.cta?.successMessage || "Thank you!";
            setTimeout(() => {
                const el = document.getElementById('successMessage');
                if (el) {
                    el.textContent = successMsg;
                    el.classList.add('show');
                    setTimeout(() => el.classList.remove('show'), 5000);
                }
            }, 500);
            return true;
        }

        // ============================================
        // SMOOTH SCROLL
        // ============================================
        document.querySelectorAll('a[href^="#"]').forEach(anchor => {
            anchor.addEventListener('click', function(e) {
                e.preventDefault();
                const target = document.querySelector(this.getAttribute('href'));
                if (target) target.scrollIntoView({ behavior: 'smooth' });
            });
        });
    </script>
    <script src="animation.js"></script>
</body>
</html>
