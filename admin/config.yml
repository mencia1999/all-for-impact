# ============================================
# CONFIGURATION DECAP CMS - ALL FOR IMPACT
# ============================================

# Backend (stockage des fichiers)
backend:
  name: git-gateway
  branch: main

# Dossiers médias
media_folder: "images"
public_folder: "/images"

# Langue de l'interface
locale: 'fr'

# ============================================
# COLLECTIONS (sections modifiables)
# ============================================

collections:
  # ========== IMAGES ==========
  - name: "images"
    label: "🖼️ Images"
    files:
      - name: "site_images"
        label: "Images du site"
        file: "content/images.json"
        fields:
          - {label: "Logo", name: "logo", widget: "image", hint: "Logo principal du site"}
          - {label: "Image Hero (fond)", name: "hero", widget: "image", hint: "Image de fond de la bannière"}
          - {label: "Image Impact (enfants)", name: "kids", widget: "image", hint: "Photo des étudiants africains"}
          
          - label: "Icônes des piliers"
            name: "pillars_icons"
            widget: "object"
            fields:
              - {label: "Icône People", name: "people", widget: "image"}
              - {label: "Icône Education", name: "light", widget: "image"}
              - {label: "Icône Impact", name: "impact", widget: "image"}
              - {label: "Icône Investment", name: "marketplace", widget: "image"}

  # ========== CONTENU FRANÇAIS ==========
  - name: "contenu_fr"
    label: "🇫🇷 Contenu Français"
    files:
      - name: "fr_content"
        label: "Toutes les sections"
        file: "content/fr.json"
        fields:
          - label: "Section Hero"
            name: "hero"
            widget: "object"
            fields:
              - {label: "Titre principal", name: "title", widget: "text"}
              - {label: "Sous-titre", name: "subtitle", widget: "text"}
              - {label: "Texte du bouton", name: "cta", widget: "string"}
          
          - label: "Section Impact"
            name: "impact"
            widget: "object"
            fields:
              - {label: "Titre de la section", name: "title", widget: "string"}
              - {label: "Description", name: "description", widget: "text"}
              
              - label: "Statistique 1"
                name: "stat1"
                widget: "object"
                fields:
                  - {label: "Chiffre", name: "number", widget: "string"}
                  - {label: "Label", name: "label", widget: "text"}
              
              - label: "Statistique 2"
                name: "stat2"
                widget: "object"
                fields:
                  - {label: "Chiffre", name: "number", widget: "string"}
                  - {label: "Label", name: "label", widget: "text"}
              
              - label: "Statistique 3"
                name: "stat3"
                widget: "object"
                fields:
                  - {label: "Chiffre", name: "number", widget: "string"}
                  - {label: "Label", name: "label", widget: "text"}
              
              - label: "Statistique 4"
                name: "stat4"
                widget: "object"
                fields:
                  - {label: "Chiffre", name: "number", widget: "string"}
                  - {label: "Label", name: "label", widget: "text"}
          
          - label: "Section Piliers"
            name: "pillars"
            widget: "object"
            fields:
              - {label: "Titre", name: "title", widget: "string"}
              - {label: "Sous-titre", name: "subtitle", widget: "text"}
              
              - label: "Pour Qui ?"
                name: "forWhom"
                widget: "object"
                fields:
                  - {label: "Titre", name: "title", widget: "string"}
                  - {label: "Contenu", name: "content", widget: "text"}
              
              - label: "Information & Formation"
                name: "information"
                widget: "object"
                fields:
                  - {label: "Titre", name: "title", widget: "string"}
                  - {label: "Contenu", name: "content", widget: "text"}
              
              - label: "Impact"
                name: "impact"
                widget: "object"
                fields:
                  - {label: "Titre", name: "title", widget: "string"}
                  - {label: "Contenu", name: "content", widget: "text"}
              
              - label: "Investissement"
                name: "investment"
                widget: "object"
                fields:
                  - {label: "Titre", name: "title", widget: "string"}
                  - {label: "Contenu", name: "content", widget: "text"}
          
          - label: "Call to Action"
            name: "cta"
            widget: "object"
            fields:
              - {label: "Titre", name: "title", widget: "string"}
              - {label: "Sous-titre", name: "subtitle", widget: "text"}
              - {label: "Placeholder email", name: "emailPlaceholder", widget: "string"}
              - {label: "Texte bouton", name: "button", widget: "string"}
              - {label: "Texte anti-spam", name: "noSpam", widget: "string"}
              - {label: "Message de succès", name: "successMessage", widget: "string"}
          
          - label: "Réseaux Sociaux"
            name: "social"
            widget: "object"
            fields:
              - {label: "Texte bouton LinkedIn", name: "followLinkedIn", widget: "string"}
          
          - label: "Pied de page"
            name: "footer"
            widget: "object"
            fields:
              - {label: "Copyright", name: "copyright", widget: "string"}
              - {label: "Confidentialité", name: "privacy", widget: "string"}
              - {label: "Conditions", name: "terms", widget: "string"}
              - {label: "Contact", name: "contact", widget: "string"}

  # ========== CONTENU ANGLAIS ==========
  - name: "contenu_en"
    label: "🇬🇧 English Content"
    files:
      - name: "en_content"
        label: "All sections"
        file: "content/en.json"
        fields:
          - label: "Hero Section"
            name: "hero"
            widget: "object"
            fields:
              - {label: "Main Title", name: "title", widget: "text"}
              - {label: "Subtitle", name: "subtitle", widget: "text"}
              - {label: "Button Text", name: "cta", widget: "string"}
          
          - label: "Impact Section"
            name: "impact"
            widget: "object"
            fields:
              - {label: "Section Title", name: "title", widget: "string"}
              - {label: "Description", name: "description", widget: "text"}
              
              - label: "Statistic 1"
                name: "stat1"
                widget: "object"
                fields:
                  - {label: "Number", name: "number", widget: "string"}
                  - {label: "Label", name: "label", widget: "text"}
              
              - label: "Statistic 2"
                name: "stat2"
                widget: "object"
                fields:
                  - {label: "Number", name: "number", widget: "string"}
                  - {label: "Label", name: "label", widget: "text"}
              
              - label: "Statistic 3"
                name: "stat3"
                widget: "object"
                fields:
                  - {label: "Number", name: "number", widget: "string"}
                  - {label: "Label", name: "label", widget: "text"}
              
              - label: "Statistic 4"
                name: "stat4"
                widget: "object"
                fields:
                  - {label: "Number", name: "number", widget: "string"}
                  - {label: "Label", name: "label", widget: "text"}
          
          - label: "Pillars Section"
            name: "pillars"
            widget: "object"
            fields:
              - {label: "Title", name: "title", widget: "string"}
              - {label: "Subtitle", name: "subtitle", widget: "text"}
              
              - label: "For Whom?"
                name: "forWhom"
                widget: "object"
                fields:
                  - {label: "Title", name: "title", widget: "string"}
                  - {label: "Content", name: "content", widget: "text"}
              
              - label: "Information & Education"
                name: "information"
                widget: "object"
                fields:
                  - {label: "Title", name: "title", widget: "string"}
                  - {label: "Content", name: "content", widget: "text"}
              
              - label: "Impact"
                name: "impact"
                widget: "object"
                fields:
                  - {label: "Title", name: "title", widget: "string"}
                  - {label: "Content", name: "content", widget: "text"}
              
              - label: "Investment"
                name: "investment"
                widget: "object"
                fields:
                  - {label: "Title", name: "title", widget: "string"}
                  - {label: "Content", name: "content", widget: "string"}
          
          - label: "Call to Action"
            name: "cta"
            widget: "object"
            fields:
              - {label: "Title", name: "title", widget: "string"}
              - {label: "Subtitle", name: "subtitle", widget: "text"}
              - {label: "Email Placeholder", name: "emailPlaceholder", widget: "string"}
              - {label: "Button Text", name: "button", widget: "string"}
              - {label: "No Spam Text", name: "noSpam", widget: "string"}
              - {label: "Success Message", name: "successMessage", widget: "string"}
          
          - label: "Social"
            name: "social"
            widget: "object"
            fields:
              - {label: "LinkedIn Button", name: "followLinkedIn", widget: "string"}
          
          - label: "Footer"
            name: "footer"
            widget: "object"
            fields:
              - {label: "Copyright", name: "copyright", widget: "string"}
              - {label: "Privacy", name: "privacy", widget: "string"}
              - {label: "Terms", name: "terms", widget: "string"}
              - {label: "Contact", name: "contact", widget: "string"}

  # ========== CONFIGURATION GÉNÉRALE ==========
  - name: "config"
    label: "⚙️ Configuration"
    files:
      - name: "general"
        label: "Paramètres généraux"
        file: "content/config.json"
        fields:
          - {label: "Nom du site", name: "siteName", widget: "string"}
          - {label: "URL du site", name: "siteUrl", widget: "string"}
          - {label: "Description SEO", name: "seoDescription", widget: "text"}
          - {label: "Email Mailchimp", name: "mailchimpEmail", widget: "string", hint: "Email de contact associé au compte Mailchimp"}
          
          - label: "Réseaux Sociaux"
            name: "socialLinks"
            widget: "object"
            fields:
              - {label: "LinkedIn", name: "linkedin", widget: "string"}
              - {label: "Facebook", name: "facebook", widget: "string"}
              - {label: "Twitter", name: "twitter", widget: "string"}
              - {label: "Instagram", name: "instagram", widget: "string"}
  
  - name: "banner"
    label: "📢 Bannière À la une"
    files:
      - name: "banner"
        label: "Bannière C3"
        file: "content/banner.json"
        fields:
          - {label: "Activer la bannière", name: "active", widget: "boolean", default: false}
          - {label: "Texte FR", name: "text_fr", widget: "text"}
          - {label: "Texte EN", name: "text_en", widget: "text"}
          - {label: "Bouton 1 - Label FR", name: "btn1_text_fr", widget: "string"}
          - {label: "Bouton 1 - Label EN", name: "btn1_text_en", widget: "string"}
          - {label: "Bouton 1 - URL PDF", name: "btn1_url", widget: "string"}
          - {label: "Bouton 2 - Label FR", name: "btn2_text_fr", widget: "string"}
          - {label: "Bouton 2 - Label EN", name: "btn2_text_en", widget: "string"}
          - {label: "Bouton 2 - URL PDF", name: "btn2_url", widget: "string"}
