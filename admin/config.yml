# ============================================
# CONFIGURATION DECAP CMS - ALL FOR IMPACT
# ============================================

# Backend (stockage des fichiers)
backend:
  name: git-gateway
  branch: main  # ou master selon votre repo



# Dossiers médias
media_folder: "images/uploads"  # Où sont stockées les nouvelles images
public_folder: "/images/uploads"

# Langue de l'interface
locale: 'fr'

# Logo personnalisé (optionnel)
logo_url: /images/logo.png

# ============================================
# COLLECTIONS (sections modifiables)
# ============================================

collections:
  # ========== CONTENU FRANÇAIS ==========
  - name: "contenu_fr"
    label: "🇫🇷 Contenu Français"
    files:
      
      # --- HERO SECTION ---
      - name: "hero_fr"
        label: "Hero (Bannière)"
        file: "content/fr.json"
        fields:
          - label: "Section Hero" 
            name: "hero"
            widget: "object"
            fields:
              - {label: "Titre principal", name: "title", widget: "text", hint: "Le grand titre en haut de la page"}
              - {label: "Sous-titre", name: "subtitle", widget: "text"}
              - {label: "Texte du bouton", name: "cta", widget: "string"}
          
          # --- SECTION IMPACT ---
          - label: "Section Impact"
            name: "impact"
            widget: "object"
            fields:
              - {label: "Titre de la section", name: "title", widget: "string"}
              - {label: "Description", name: "description", widget: "text"}
              
              # Statistique 1
              - label: "Statistique 1"
                name: "stat1"
                widget: "object"
                fields:
                  - {label: "Chiffre", name: "number", widget: "string"}
                  - {label: "Label", name: "label", widget: "text"}
              
              # Statistique 2
              - label: "Statistique 2"
                name: "stat2"
                widget: "object"
                fields:
                  - {label: "Chiffre", name: "number", widget: "string"}
                  - {label: "Label", name: "label", widget: "text"}
              
              # Statistique 3
              - label: "Statistique 3"
                name: "stat3"
                widget: "object"
                fields:
                  - {label: "Chiffre", name: "number", widget: "string"}
                  - {label: "Label", name: "label", widget: "text"}
              
              # Statistique 4
              - label: "Statistique 4"
                name: "stat4"
                widget: "object"
                fields:
                  - {label: "Chiffre", name: "number", widget: "string"}
                  - {label: "Label", name: "label", widget: "text"}
          
          # --- SECTION PILLARS ---
          - label: "Section Piliers"
            name: "pillars"
            widget: "object"
            fields:
              - {label: "Titre", name: "title", widget: "string"}
              - {label: "Sous-titre", name: "subtitle", widget: "text"}
              
              # Pilier 1 - For Whom
              - label: "Pour Qui ?"
                name: "forWhom"
                widget: "object"
                fields:
                  - {label: "Titre", name: "title", widget: "string"}
                  - {label: "Contenu", name: "content", widget: "text"}
              
              # Pilier 2 - Information
              - label: "Information & Formation"
                name: "information"
                widget: "object"
                fields:
                  - {label: "Titre", name: "title", widget: "string"}
                  - {label: "Contenu", name: "content", widget: "text"}
              
              # Pilier 3 - Impact
              - label: "Impact"
                name: "impact"
                widget: "object"
                fields:
                  - {label: "Titre", name: "title", widget: "string"}
                  - {label: "Contenu", name: "content", widget: "text"}
              
              # Pilier 4 - Investment
              - label: "Investissement"
                name: "investment"
                widget: "object"
                fields:
                  - {label: "Titre", name: "title", widget: "string"}
                  - {label: "Contenu", name: "content", widget: "text"}
          
          # --- SECTION CTA FOOTER ---
          - label: "Call to Action"
            name: "cta"
            widget: "object"
            fields:
              - {label: "Titre", name: "title", widget: "string"}
              - {label: "Sous-titre", name: "subtitle", widget: "text"}
              - {label: "Placeholder email", name: "emailPlaceholder", widget: "string"}
              - {label: "Texte bouton", name: "button", widget: "string"}
              - {label: "Texte anti-spam", name: "noSpam", widget: "string"}
              - {label: "Message de succès", name: "successMessage", widget: "string"}
          
          # --- SECTION SOCIAL ---
          - label: "Réseaux Sociaux"
            name: "social"
            widget: "object"
            fields:
              - {label: "Texte bouton LinkedIn", name: "followLinkedIn", widget: "string"}
          
          # --- FOOTER ---
          - label: "Pied de page"
            name: "footer"
            widget: "object"
            fields:
              - {label: "Copyright", name: "copyright", widget: "string"}
              - {label: "Confidentialité", name: "privacy", widget: "string"}
              - {label: "Conditions", name: "terms", widget: "string"}
              - {label: "Contact", name: "contact", widget: "string"}

  # ========== CONTENU ANGLAIS ==========
  - name: "contenu_en"
    label: "🇬🇧 English Content"
    files:
      
      # Même structure que FR
      - name: "hero_en"
        label: "Hero (Banner)"
        file: "content/en.json"
        fields:
          - label: "Hero Section"
            name: "hero"
            widget: "object"
            fields:
              - {label: "Main Title", name: "title", widget: "text"}
              - {label: "Subtitle", name: "subtitle", widget: "text"}
              - {label: "Button Text", name: "cta", widget: "string"}
          
          - label: "Impact Section"
            name: "impact"
            widget: "object"
            fields:
              - {label: "Section Title", name: "title", widget: "string"}
              - {label: "Description", name: "description", widget: "text"}
              
              - label: "Statistic 1"
                name: "stat1"
                widget: "object"
                fields:
                  - {label: "Number", name: "number", widget: "string"}
                  - {label: "Label", name: "label", widget: "text"}
              
              - label: "Statistic 2"
                name: "stat2"
                widget: "object"
                fields:
                  - {label: "Number", name: "number", widget: "string"}
                  - {label: "Label", name: "label", widget: "text"}
              
              - label: "Statistic 3"
                name: "stat3"
                widget: "object"
                fields:
                  - {label: "Number", name: "number", widget: "string"}
                  - {label: "Label", name: "label", widget: "text"}
              
              - label: "Statistic 4"
                name: "stat4"
                widget: "object"
                fields:
                  - {label: "Number", name: "number", widget: "string"}
                  - {label: "Label", name: "label", widget: "text"}
          
          - label: "Pillars Section"
            name: "pillars"
            widget: "object"
            fields:
              - {label: "Title", name: "title", widget: "string"}
              - {label: "Subtitle", name: "subtitle", widget: "text"}
              
              - label: "For Whom?"
                name: "forWhom"
                widget: "object"
                fields:
                  - {label: "Title", name: "title", widget: "string"}
                  - {label: "Content", name: "content", widget: "text"}
              
              - label: "Information & Education"
                name: "information"
                widget: "object"
                fields:
                  - {label: "Title", name: "title", widget: "string"}
                  - {label: "Content", name: "content", widget: "text"}
              
              - label: "Impact"
                name: "impact"
                widget: "object"
                fields:
                  - {label: "Title", name: "title", widget: "string"}
                  - {label: "Content", name: "content", widget: "text"}
              
              - label: "Investment"
                name: "investment"
                widget: "object"
                fields:
                  - {label: "Title", name: "title", widget: "string"}
                  - {label: "Content", name: "content", widget: "text"}
          
          - label: "Call to Action"
            name: "cta"
            widget: "object"
            fields:
              - {label: "Title", name: "title", widget: "string"}
              - {label: "Subtitle", name: "subtitle", widget: "text"}
              - {label: "Email Placeholder", name: "emailPlaceholder", widget: "string"}
              - {label: "Button Text", name: "button", widget: "string"}
              - {label: "No Spam Text", name: "noSpam", widget: "string"}
              - {label: "Success Message", name: "successMessage", widget: "string"}
          
          - label: "Social"
            name: "social"
            widget: "object"
            fields:
              - {label: "LinkedIn Button", name: "followLinkedIn", widget: "string"}
          
          - label: "Footer"
            name: "footer"
            widget: "object"
            fields:
              - {label: "Copyright", name: "copyright", widget: "string"}
              - {label: "Privacy", name: "privacy", widget: "string"}
              - {label: "Terms", name: "terms", widget: "string"}
              - {label: "Contact", name: "contact", widget: "string"}

  # ========== CONFIGURATION GÉNÉRALE ==========
  - name: "config"
    label: "⚙️ Configuration"
    files:
      - name: "general"
        label: "Paramètres généraux"
        file: "content/config.json"
        fields:
          - {label: "Nom du site", name: "siteName", widget: "string"}
          - {label: "URL du site", name: "siteUrl", widget: "string"}
          - {label: "Description SEO", name: "seoDescription", widget: "text"}
          - {label: "Email Mailchimp", name: "mailchimpEmail", widget: "string"}
          
          - label: "Réseaux Sociaux"
            name: "socialLinks"
            widget: "object"
            fields:
              - {label: "LinkedIn", name: "linkedin", widget: "string"}
              - {label: "Facebook", name: "facebook", widget: "string"}
              - {label: "Twitter", name: "twitter", widget: "string"}
              - {label: "Instagram", name: "instagram", widget: "string"}